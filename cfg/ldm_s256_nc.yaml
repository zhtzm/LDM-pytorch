models:
  main_model:
    target: ldm.ldm.LDM
    params:
      conditioning_key: null
      ddpm_config:
        beta: [0.00085, 0.012]
        t_max: 500
        channel: 4
        size: 32
        clip_denoised: True
        sample_img_every_t: 100
        loss_type: l1
        unet_config:
          t_max: 500
          init_channels: 4
          base_channels: 128
          channel_mults: [1, 2, 4, 4]
          use_attention: [2]
          num_res_blocks: 2
          num_groups: 32
          dropout: 0.1
          time_emb_scale: 1.0
          use_t_emb: True
      ae_model:
        target: ldm.vae.VAE
        ckpt_file: null
        params:
          embed_dim: 4
          coder_config:
            init_channels: 3
            base_channels: 32
            final_channels: 4
            channel_mults: [1, 2, 2, 4]
            use_attention: []
            num_res_blocks: 2
            num_groups: 32
            dropout: 0.1
      condition_model:
        target: null
        ckpt_file: null
        params: null
images:
  image_size: 256
  image_channels: 3
dataset:
  target: datasets.image_dataset.ImageDataset
  params:
    data_dir: E:\datasets\animefaces-konachan
    batch_size: 32
    train_ratio: 0.8
train:
  use_ema: False
  device: cuda:0
  epochs: 300
  lr: 0.0001
  base_path: runs
